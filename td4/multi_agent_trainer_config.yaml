behaviors:
  BoidAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 700
      buffer_size: 21000
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    checkpoint_interval: 2500000
    keep_checkpoints: 100
    max_steps: 5000
    time_horizon: 600
    summary_freq: 500000
    
  HunterAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 120
      buffer_size: 600
      learning_rate: 4.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    checkpoint_interval: 100000
    keep_checkpoints: 100
    max_steps: 50000000
    time_horizon: 600
    summary_freq: 100000
    init_path: results\Hunter_LevelUp_11\HunterAgent\checkpoint.pt

default_settings:
  trainer_type: ppo
  hyperparameters:
    batch_size: 128
    buffer_size: 2000
    learning_rate: 3.0e-4
    beta: 5.0e-3
    epsilon: 0.2
    lambd: 0.95
    num_epoch: 3
  network_settings:
    normalize: true
    hidden_units: 128
    num_layers: 2
  reward_signals:
    extrinsic:
      gamma: 0.99
      strength: 1.0
